name: 🐳 Build & Push Docker Image

on:
  push:
    branches: [main, master]      # 推送主分支时触发
    tags: ['v*']                   # 打 tag 时也触发
  pull_request:
    branches: [main]              # PR 时构建测试（不推送）

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # 自动变成: ghcr.io/tongnian998-blip/qwen2api

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write              # 🔑 关键：允许推送镜像到 GitHub Packages
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🛠️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                    # 项目根目录
          file: ./Dockerfile           # Dockerfile 路径（根目录可省略）
          push: ${{ github.event_name != 'pull_request' }}  # PR 时不推送
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha         # 🚀 启用 GitHub Actions 缓存加速
          cache-to: type=gha,mode=max
