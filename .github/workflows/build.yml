version: '3.8'
services:
  qwen2api:
    build: .
    container_name: qwen2api
    ports:
      - "8765:7860"  # 宿主机:容器
    environment:
      - API_TOKENS=your_secret_token  # 🔐 建议设置
      - CHAT_DETAIL_LOG=false
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
