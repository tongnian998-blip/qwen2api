name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'      # 只监听 packages 目录变化
      - '.github/workflows/**'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 🔍 步骤1：检测哪些 package 有变更
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      service-a: ${{ steps.filter.outputs.service-a }}
      service-b: ${{ steps.filter.outputs.service-b }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            service-a:
              - 'packages/service-a/**'
              - 'packages/shared-lib/**'
            service-b:
              - 'packages/service-b/**'
              - 'packages/shared-lib/**'

  # 🏗️ 步骤2：构建并发布 service-a（仅当有变更时）
  build-service-a:
    needs: detect-changes
    if: needs.detect-changes.outputs.service-a == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service-a
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/service-a/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/service-a:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/service-a:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 🔁 同理构建 service-b...
  build-service-b:
    needs: detect-changes
    if: needs.detect-changes.outputs.service-b == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/service-b/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/service-b:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
